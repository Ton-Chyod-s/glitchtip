x-environment: &default-environment
  DATABASE_URL: ${DATABASE_URL}
  VALKEY_URL: ${VALKEY_URL}
  SECRET_KEY: ${SECRET_KEY}
  PORT: ${PORT}
  EMAIL_URL: ${EMAIL_URL}
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  CELERY_WORKER_AUTOSCALE: ${CELERY_WORKER_AUTOSCALE}

x-depends_on: &default-depends_on
  - postgres
  
x-depends_on-prod: &default-depends_on-prod
  condition: service_started

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - shared-net
    ports:
      - "127.0.0.1:5434:5432"
    profiles:
      - local

  # valkey: # Optional, but offers better performance. Uncomment and set VALKEY_URL to enable.
  #  image: valkey/valkey
  #  restart: unless-stopped

  web:
    image: glitchtip/glitchtip
    depends_on: {}
    ports:
      - "8000:8000"
    environment: *default-environment
    command: ./bin/run-all-in-one.sh # Runs web/worker/beat/migrate all in one container
    restart: unless-stopped
    volumes:
      - uploads:/code/uploads
    networks:
      - shared-net

networks:
  shared-net:
    external: true
    
volumes:
  pg-data:
  uploads:
